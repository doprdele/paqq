name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Build/Test (Bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

  backend-carriers:
    name: Backend Carrier Integration (Non-Amazon)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run carrier integration tests
        run: bun run test:integration:carriers

  scraper:
    name: Scraper Build/Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: usps-scraper
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: usps-scraper/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  scraper-carriers:
    name: Scraper Carrier Spec/Integration (Non-Amazon)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: usps-scraper
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: usps-scraper/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run carrier spec tests
        run: npm run test:spec:carriers

      - name: Run carrier integration tests
        run: npm run test:integration:carriers

  frontend:
    name: Frontend Static Checks (Bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend static checks
        run: bun run test
