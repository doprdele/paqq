name: Release (CalVer)

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  actions: read
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      !startsWith(github.event.workflow_run.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Pages workflow on source commit
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const targetSha = process.env.TARGET_SHA;
            const workflowNameCandidates = new Set([
              'pages-build-deployment',
              'pages build and deployment'
            ]);
            const timeoutMs = 20 * 60 * 1000;
            const pollMs = 15 * 1000;
            const startedAt = Date.now();

            function sleep(ms) {
              return new Promise((resolve) => setTimeout(resolve, ms));
            }

            while (Date.now() - startedAt < timeoutMs) {
              const workflows = await github.paginate(github.rest.actions.listRepoWorkflows, {
                owner,
                repo,
                per_page: 100
              });
              const pagesWorkflow = workflows.find(
                (w) =>
                  workflowNameCandidates.has((w.name || '').toLowerCase()) ||
                  ((w.path || '').toLowerCase().includes('pages-build-deployment'))
              );

              if (!pagesWorkflow) {
                core.info('Pages workflow is not configured for this repository. Skipping wait.');
                return;
              }

              const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                owner,
                repo,
                workflow_id: pagesWorkflow.id,
                head_sha: targetSha,
                per_page: 100
              });
              const run = runs[0];

              if (!run) {
                core.info(`No Pages run found yet for ${targetSha}; retrying...`);
                await sleep(pollMs);
                continue;
              }

              core.info(`Pages run ${run.id} status=${run.status} conclusion=${run.conclusion}`);
              if (run.status !== 'completed') {
                await sleep(pollMs);
                continue;
              }

              if (run.conclusion !== 'success') {
                core.setFailed(`Pages workflow for ${targetSha} concluded with ${run.conclusion}.`);
              }
              return;
            }

            core.setFailed(`Timed out waiting for Pages workflow on ${targetSha}.`);

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute next CalVer and bump package versions
        id: bump
        run: |
          git fetch --tags origin
          version="$(./scripts/release-calver.sh | tail -n 1)"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Commit release version changes
        run: |
          git add backend/package.json frontend/package.json usps-scraper/package.json usps-scraper/package-lock.json
          git commit -m "chore(release): ${{ steps.bump.outputs.version }} [skip ci]"

      - name: Create git tag
        run: |
          git tag "${{ steps.bump.outputs.tag }}"

      - name: Push release commit and tag
        run: |
          git push origin main
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          generate_release_notes: true
