services:
  usps-scraper:
    build:
      context: ./usps-scraper
    environment:
      PORT: "8790"
      USPS_HEADFUL: "0"
      USPS_SCRAPE_MAX_ATTEMPTS: "2"
    ports:
      - "8790:8790"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8790/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
    environment:
      PORT: "8787"
      HOST: "0.0.0.0"
      USPS_SCRAPER_URL: "http://usps-scraper:8790"
      USPS_SCRAPER_TOKEN: "${USPS_SCRAPER_TOKEN:-}"
      USPS_SCRAPER_TIMEOUT_MS: "${USPS_SCRAPER_TIMEOUT_MS:-60000}"
    depends_on:
      usps-scraper:
        condition: service_healthy
    ports:
      - "8787:8787"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/api/list').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    environment:
      PACKT_API_BASE_URL: "${PACKT_API_BASE_URL:-}"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
