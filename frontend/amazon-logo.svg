<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" role="img" aria-labelledby="title desc">
  <title id="title">Amazon Logo</title>
  <desc id="desc">Amazon wordmark and smile arrow</desc>
  <defs>
    <linearGradient id="smile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb347" />
      <stop offset="100%" stop-color="#ff9900" />
    </linearGradient>
  </defs>
  <rect width="320" height="120" rx="12" fill="#ffffff" fill-opacity="0.0" />
  <text
    x="28"
    y="64"
    font-size="56"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700"
    fill="#111827"
    letter-spacing="1"
  >
    amazon
  </text>
  <path
    d="M48 80 C98 116, 206 112, 270 78"
    fill="none"
    stroke="url(#smile)"
    stroke-width="11"
    stroke-linecap="round"
  />
  <path d="M255 70 L278 78 L258 91" fill="none" stroke="#ff9900" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
</svg>
